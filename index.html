<!DOCTYPE html>
<html lang='bs'>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Krugovi</title>
	<style>
		html, body { margin: 0; padding: 0; }
		canvas { display: block; background: #f2f2f2; z-index: 0; position: fixed;}
		.overlay{
			position: fixed;
			inset: 0;
			display: flex;
			flex-direction: column;
			gap: 12px;
			align-items: center;
			justify-content: center;
			background: rgba(0,0,0,0.6);
			color: white;
			font-family: Arial, sans-serif;
			z-index: 10;
		}
		button{ font-size: 18px; padding: 10px 16px; }
	</style>
	<script src="script.js" defer></script>
</head>
<body>
<canvas id="mycanvas"></canvas>
<div id="menu" class="overlay">
	<h1>Krugovi</h1>
	<h3 id="highScore" style="margin-block-start: 0; font-size: 0.9em;"></h3>
	<button id="reset_hs">obriši rekord</button>
	<button id="themeBtn">Theme</button>
	<div id="colorPicker" style="display:flex; gap:12px; align-items:center;">
		<label style="background-color: hsl(7, 82%, 63%);"><input type="radio" name="playerColor" value="c" style="accent-color: hsl(7, 82%, 63%);" checked> </label>
		<label style="background-color: hsl(196, 67%, 33%);"><input type="radio" name="playerColor" value="p" style="accent-color: hsl(196, 67%, 33%);"> </label>
		<label style="background-color: hsl(141, 31%, 50%);"><input type="radio" name="playerColor" value="z" style="accent-color: hsl(141, 31%, 50%);"> </label>
	</div>
	<button id="startBtn">Start</button>
</div>

<div id="pauseScreen" class="overlay" style="display:none;">
	<h1>Paused</h1>
	<p>P za nastavak</p>
</div>

<div id="gameOverScreen" class="overlay" style="display:none;">
	<h1>Game Over</h1>
	<h3 id="finalScore" style="margin-block-end: 0;"></h3>
	<h3 id="highScore2" style="margin-block-start: 0; font-size: 0.9em;"></h3>
	<button id="reset_hs2">obriši rekord</button>
	<button id="themeBtn2">Theme</button>
	<button id="restartBtn">Restart</button>
</div>




</body>
</html>
